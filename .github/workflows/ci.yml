name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Always runs — no secrets required. Validates the code offline.
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  # Detects whether Convex deploy credentials are configured, so the
  # deployment-dependent jobs below can be skipped (not failed) without them.
  check-secrets:
    name: Check deploy config
    runs-on: ubuntu-latest
    outputs:
      has_convex: ${{ steps.check.outputs.has }}
    steps:
      - id: check
        run: echo "has=${{ secrets.CONVEX_DEPLOY_KEY != '' }}" >> "$GITHUB_OUTPUT"

  # Convex codegen + typecheck + Next.js build. Requires a deployment, so it
  # runs only when CONVEX_DEPLOY_KEY is set in the repo secrets.
  convex:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has_convex == 'true'
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate Convex types
        run: npx convex codegen
      - name: TypeScript check
        run: npm run typecheck
      - name: Build Next.js
        run: npm run build:next
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}

  # Deploy to Convex production on pushes to main, when credentials exist.
  deploy:
    name: Deploy (Convex production)
    runs-on: ubuntu-latest
    needs: [check-secrets, convex]
    if: needs.check-secrets.outputs.has_convex == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Convex
        run: npx convex deploy
