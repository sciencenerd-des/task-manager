name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Always runs — no secrets required. Validates the code offline.
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  # Convex codegen + typecheck + Next.js build. This pushes the functions to the
  # Convex deployment, which requires the deployment to be fully configured
  # (deploy key + WorkOS env vars set ON the deployment). Opt in by setting the
  # repository variable CONVEX_DEPLOY=true once that's done.
  convex:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    if: ${{ vars.CONVEX_DEPLOY == 'true' }}
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate Convex types
        run: npx convex codegen
      - name: TypeScript check
        run: npm run typecheck
      - name: Build Next.js
        run: npm run build:next
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}

  # Deploy to Convex production on pushes to main, once opted in.
  deploy:
    name: Deploy (Convex production)
    runs-on: ubuntu-latest
    needs: convex
    if: ${{ vars.CONVEX_DEPLOY == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Convex
        run: npx convex deploy
